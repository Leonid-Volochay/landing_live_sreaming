<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/favicon.png">
    <link rel="stylesheet" href="/dist/index.css">
    <title>Live streaming</title>
  </head>
  <body>
    <header class="header" aria-label="header">
      <div class="container">
        <nav class="header__nav nav" aria-label="header navigation">
          <div class="nav__title">
            <a href="#" class="nav__title-link">Cloud <span>Flex</span></a>
          </div>
          <div class="nav__links">
            <ul class="nav__links-list list" aria-label="header nav list">
              <li class="list__item" aria-label="first list">
                <a href="#" class="list__item-link">About us</a>
              </li>
              <li class="list__item" aria-label="second list">
                <a href="#" class="list__item-link">Contact</a>
              </li>
            </ul>
          </div>
          <div class="nav__covid-wrapper covid">
            <a href="#" class="covid__link" aria-label="COVID update">COVID-19 UPDATE</a>
          </div>
          <div class="nav__earth-wrapper earth">
            <a href="#" class="earth__link" aria-label="globe info">
              <svg class="earth__link-icon" aria-label="earth icon">
                <use href="/assets/sprites.svg#earth-icon"></use>
              </svg>
            </a>
          </div>
        </nav>
      </div>
    </header>
    
    <main aria-label="main content">
      <section class="hero-section" aria-label="hero section">
        <div class="container">
          <div class="hero">

            <div class="hero__content">
              <h1 class="hero__title">
                When performance matters
              </h1>
              <button class="hero__action-btn">
                Start development with us!
              </button>
            </div>

            <div class="hero__notify">
              <img src="./assets/img/pigeon.webp" alt="pigeon omg" class="hero__notify-img">
              <p class="hero__notify-content">
                WE USE COOKIES TO ENSURE YOUR BEST EXPERIENCE. THROUGH YOUR CONTINUED USE OF THIS SITE YOU ACCEPT THIS USE. FOR MORE INFORMATION, PLEASE SEE OUR PRIVACY POLICY.
              </p>
              <button class="hero__notify-btn">
                Accept
              </button>
            </div>

            <div class="hero__scroll">
              <span class="hero__scroll-content">
                Scroll down
              </span>
            </div>

          </div>
        </div>
      </section>

      <section class="work-section">
        <div class="container">
          <div class="work">
            <h2 class="work__title">
              How we work
            </h2>

            <div class="work__cards-wrapper">
              <figure class="info-card card--analysis" aria-label="card analysis">
                <svg class="info-card__icon icon-analysis" aria-label="analysis icon">
                  <use href="/assets/sprites.svg#lamp-icon"></use>
                </svg>
                <h3 class="info-card__title">Analysis</h3>
                <p class="info-card__desc">
                  Gathering client's ideas we are happy to help with a technical vision.
                </p>
              </figure>

              <figure class="info-card card--design" aria-label="card design">
                <svg class="info-card__icon icon-design" aria-label="design icon">
                  <use href="/assets/sprites.svg#design-icon"></use>
                </svg>
                <h3 class="info-card__title">Design</h3>
                <p class="info-card__desc">
                  In-depth analysis makes our solutions flexible, scalable and robust.
                </p>
              </figure>

              <figure class="info-card card--dev" aria-label="card dev">
                <svg class="info-card__icon icon-dev" aria-label="dev icon">
                  <use href="/assets/sprites.svg#dev-icon"></use>
                </svg>
                <h3 class="info-card__title">Development</h3>
                <p class="info-card__desc">
                  Using best practices to make reliable, well-documented and easy to maintain system.
                </p>
              </figure>

              <figure class="info-card card--support" aria-label="card support">
                <svg class="info-card__icon icon-support" aria-label="support icon">
                  <use href="/assets/sprites.svg#support-icon"></use>
                </svg>
                <h3 class="info-card__title">Maintenance</h3>
                <p class="info-card__desc">
                  Gathering client's ideas we are happy to help with a technical vision.
               </p>
              </figure>
              
              <figure class="info-card card--test" aria-label="card test">
                <svg class="info-card__icon icon-test" aria-label="test icon">
                  <use href="/assets/sprites.svg#test-icon"></use>
                </svg>
                <h3 class="info-card__title">Testing</h3>
                <p class="info-card__desc">
                  Providing best quality
                  of things developed by us for customers
               </p>
              </figure>

              <figure class="info-card card--Integration" aria-label="card Integration">
                <svg class="info-card__icon icon-Integration" aria-label="Integration icon">
                  <use href="/assets/sprites.svg#Integration-icon"></use>
                </svg>
                <h3 class="info-card__title">Integration</h3>
                <p class="info-card__desc">
                  Solutions that go with
                  the times to improve businesses and give customers best experience
               </p>
              </figure>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
