<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/favicon.png">
    <link rel="stylesheet" href="/dist/index.css">
    <title>Live streaming</title>
  </head>
  <body>
    <header class="header" aria-label="header">
      <div class="container">
        <nav class="header__nav nav" aria-label="header navigation">
          <div class="nav__title">
            <a href="#" class="nav__title-link">Cloud <span>Flex</span></a>
          </div>
          <div class="nav__links">
            <ul class="nav__links-list list" aria-label="header nav list">
              <li class="list__item" aria-label="first list">
                <a href="#" class="list__item-link">About us</a>
              </li>
              <li class="list__item" aria-label="second list">
                <a href="#" class="list__item-link">Contact</a>
              </li>
            </ul>
          </div>
          <div class="nav__covid-wrapper covid">
            <a href="#" class="covid__link" aria-label="COVID update">COVID-19 UPDATE</a>
          </div>
          <div class="nav__earth-wrapper earth">
            <a href="#" class="earth__link" aria-label="globe info">
              <svg class="earth__link-icon" aria-label="earth icon">
                <use href="/assets/sprites.svg#earth-icon"></use>
              </svg>
            </a>
          </div>
        </nav>
      </div>
    </header>
    
    <main aria-label="main content">
      <section class="hero-section" aria-label="hero section">
        <div class="container">
          <div class="hero">

            <div class="hero__content">
              <h1 class="hero__title">
                When performance matters
              </h1>
              <button class="hero__action-btn">
                Start development with us!
              </button>
            </div>

            <div class="hero__notify">
              <img src="./assets/img/pigeon.webp" alt="pigeon omg" class="hero__notify-img">
              <p class="hero__notify-content">
                WE USE COOKIES TO ENSURE YOUR BEST EXPERIENCE. THROUGH YOUR CONTINUED USE OF THIS SITE YOU ACCEPT THIS USE. FOR MORE INFORMATION, PLEASE SEE OUR PRIVACY POLICY.
              </p>
              <button class="hero__notify-btn">
                Accept
              </button>
            </div>

            <div class="hero__scroll">
              <span class="hero__scroll-content">
                Scroll down
              </span>
            </div>

          </div>
        </div>
      </section>
    </main>
  </body>
</html>
